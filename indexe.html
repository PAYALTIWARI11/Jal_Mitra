<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jal-Mitra | Gram Panchayat Water O&M</title>
    <!-- favicon to prevent 404 logs -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <!-- Load Tailwind CSS via CDN for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Chart.js for data visualization on the Analytics page -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        /* Custom font and basic scroll behavior */
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .page-content { min-height: calc(100vh - 80px); padding-bottom: 6rem; }
        /* Style for the active navigation tab */
        .nav-active {
            color: #059669; /* emerald-600 */
            border-bottom: 3px solid #059669;
            font-weight: 600;
        }
        /* Style for data entry cards (mobile focus) */
        .data-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s;
        }
        .data-card:hover {
            transform: translateY(-2px);
        }
        /* Styling for the radio buttons/labels */
        input[type="radio"]:checked + span {
            font-weight: bold;
        }
        input[type="radio"] {
            transform: scale(1.2);
        }
        /* Style for the fault list status tags */
        .status-tag-Reported { background-color: #fca5a5; color: #b91c1c; } /* Red */
        .status-tag-Assigned { background-color: #fcd34d; color: #b45309; } /* Amber */
        .status-tag-InProgress { background-color: #93c5fd; color: #1e40af; } /* Blue */
        .status-tag-Resolved { background-color: #a7f3d0; color: #065f46; } /* Green */
    </style>
</head>
<body>
    <div id="app" class="max-w-4xl mx-auto bg-white min-h-screen shadow-lg">
        <!-- Application content will be rendered here -->
        <div class="p-6 text-center text-gray-500">Initializing Jal-Mitra Application...</div>
    </div>

    <script type="module">
        // ----------------------------------------------------------------------
        // 1. FIREBASE SETUP & INITIALIZATION
        // ----------------------------------------------------------------------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, limit, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // Global variables provided by the Canvas environment (using fallbacks for local dev)
        window.appId = typeof __app_id !== 'undefined' ? __app_id : 'default-jal-mitra';
        const firebaseConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) ? JSON.parse(__firebase_config) : {};
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let app, db, auth;
        let userId = null;
        let isAuthReady = false;
        let currentPage = 'Dashboard';

        // Listeners
        let unsubscribeDashboard = null; 
        let unsubscribeFaults = null; 
        let unsubscribeAnalytics = null; 
        
        // Data Stores
        window.faultsData = [];
        window.omLogs = [];
        window.qualityLogs = [];
        window.appData = {
            systemStatus: 'Loading...',
            lastPumpRun: 'N/A',
            lastQualityCheck: 'N/A',
            pendingFaults: 0,
            qualityCompliance: 'Unknown',
            lastFault: { id: 'N/A', description: 'No recent faults', status: 'Resolved' },
            userIdDisplay: 'Loading...'
        };

        // Helper for getting collection path (Private data)
        const getCollectionPath = (collectionName) => {
            return `/artifacts/${window.appId}/users/${userId}/${collectionName}`;
        };
        
        // Helper for displaying non-alert messages (replacing forbidden alert/confirm)
        window.showModalMessage = (message, type = 'success') => {
            const existingModal = document.getElementById('status-modal');
            if (existingModal) existingModal.remove();

            const typeColorMap = {
                'success': 'bg-emerald-600',
                'error': 'bg-red-600',
                'warning': 'bg-amber-600'
            };
            const bgColor = typeColorMap[type] || 'bg-indigo-600';

            const modalHtml = `
                <div id="status-modal" class="fixed inset-0 bg-gray-900 bg-opacity-80 flex items-center justify-center z-50 transition-opacity duration-300 backdrop-blur-sm">
                    <div class="p-6 rounded-xl shadow-2xl max-w-sm w-full transform transition-transform duration-300 scale-100 ${bgColor} text-white">
                        <div class="flex items-center space-x-3 mb-3">
                            <h3 class="text-xl font-bold">${type === 'success' ? 'Success' : type.charAt(0).toUpperCase() + type.slice(1)}</h3>
                        </div>
                        <p class="text-base">${message}</p>
                        <button onclick="document.getElementById('status-modal').remove()"
                                class="mt-4 w-full py-2 bg-white text-gray-800 font-semibold rounded-lg hover:bg-gray-100 transition-colors">Close</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        };


        // Initialize Firebase and Authentication (Resilient to Auth failures)
        window.initializeAppAndAuth = async () => {
            try {
                if (Object.keys(firebaseConfig).length === 0) {
                    console.error("Firebase configuration is missing.");
                    document.getElementById('app').innerHTML = `<div class="p-8 text-center text-red-600">ERROR: Firebase configuration is missing. Cannot proceed.</div>`;
                    return;
                }
                
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                getAnalytics(app); // Initialize analytics

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        window.appData.userIdDisplay = userId.substring(0, 12) + '...';

                        // Setup listeners and render only on first auth state change
                        if (!isAuthReady) {
                            isAuthReady = true;
                            setupAllListeners(); 
                            window.navigate('Dashboard');
                        }
                    } else if (isAuthReady) {
                        // User logged out
                        userId = null;
                        window.navigate('Login');
                    } else {
                        // First load, no user -> attempt anonymous sign-in (for development)
                        try {
                             await signInAnonymously(auth);
                        } catch (e) {
                            console.error("[AUTH FAIL] Anonymous sign-in failed:", e.code);
                            // Fallback if anonymous is disabled
                            handleAuthFallback(e);
                        }
                    }
                });

                // Attempt custom token sign-in if provided (Canvas Environment)
                if (initialAuthToken) {
                    try {
                        await signInWithCustomToken(auth, initialAuthToken);
                    } catch (e) {
                        console.warn("Custom token sign-in failed. Relying on anonymous/email auth.", e);
                    }
                }

            } catch (error) {
                console.error("Critical Firebase Initialization Error:", error);
                handleAuthFallback(error);
            }
        };

        // Fallback for when Firebase Auth fails (e.g., operation-not-allowed)
        const handleAuthFallback = (error) => {
            if (!isAuthReady) {
                isAuthReady = true;
                userId = 'dev-fallback-' + Math.random().toString(36).substring(2, 8);
                window.appData.userIdDisplay = 'FALLBACK (No Save)';
                window.showModalMessage("Authentication Failed", `Running in DEVELOPMENT FALLBACK MODE (${error.code || 'unknown'}). You can use the UI, but data will not save to Firestore.`, 'error');
                window.navigate('Dashboard');
            }
        };


        // --- LISTENER SETUP ---
        const setupAllListeners = () => {
            if (!db || !userId) return; 

            const omQuery = query(collection(db, getCollectionPath('OMLogs')), orderBy('timestamp', 'desc'));
            const qualityQuery = query(collection(db, getCollectionPath('WaterQuality')), orderBy('timestamp', 'desc'));
            const faultQuery = query(collection(db, getCollectionPath('Faults')), orderBy('timestamp', 'desc'));

            // 1. O&M Logs Listener
            onSnapshot(omQuery, (snapshot) => {
                window.omLogs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                updateDashboardSummary();
                if (currentPage === 'Dashboard' || currentPage === 'Analytics') window.renderApp();
            }, (error) => console.error("Error fetching O&M Log:", error));

            // 2. Water Quality Listener
            onSnapshot(qualityQuery, (snapshot) => {
                window.qualityLogs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                updateDashboardSummary();
                if (currentPage === 'Dashboard' || currentPage === 'Analytics') window.renderApp();
            }, (error) => console.error("Error fetching Water Quality:", error));

            // 3. Faults Listener
            unsubscribeFaults = onSnapshot(faultQuery, (snapshot) => {
                window.faultsData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                updateDashboardSummary();
                if (currentPage === 'Dashboard' || currentPage === 'Faults') window.renderApp();
            }, (error) => console.error("Error fetching Faults:", error));
        };

        // --- DATA PROCESSING ---
        const updateDashboardSummary = () => {
            const omLogs = window.omLogs;
            const qualityLogs = window.qualityLogs;
            const faultsData = window.faultsData;

            const latestOMLog = omLogs.length > 0 ? omLogs[0] : null;
            const latestQualityLog = qualityLogs.length > 0 ? qualityLogs[0] : null;

            // Update Pump Status
            window.appData.lastPumpRun = latestOMLog ? `${latestOMLog.pumpHours || '0'} hrs` : 'N/A';

            // Update Faults
            const pendingFaults = faultsData.filter(f => f.status !== 'Resolved');
            window.appData.pendingFaults = pendingFaults.length;
            window.appData.lastFault = pendingFaults[0] || { description: 'No outstanding issues.', status: 'Resolved' };

            // Update Water Quality Compliance
            if (latestQualityLog) {
                const pH = parseFloat(latestQualityLog.pH);
                const chlorine = parseFloat(latestQualityLog.chlorineLevel);
                const isCompliant = (pH >= 6.5 && pH <= 8.5) && (chlorine >= 0.2);
                
                window.appData.qualityCompliance = isCompliant ? 'Compliant' : 'Non-Compliant';
                window.appData.lastQualityCheck = latestQualityLog.timestamp ? new Date(latestQualityLog.timestamp.toDate()).toLocaleDateString() : 'N/A';
            } else {
                window.appData.qualityCompliance = 'Needs Check';
            }

            // Update Overall Status
            let overallStatus = 'Operational';
            if (window.appData.qualityCompliance === 'Non-Compliant') {
                overallStatus = 'Fault';
            } else if (window.appData.pendingFaults > 0) {
                overallStatus = 'Warning';
            }
            window.appData.systemStatus = overallStatus;
        };


        // ----------------------------------------------------------------------
        // 2. LOGIC & SUBMISSION HANDLERS
        // ----------------------------------------------------------------------
        
        window.handleLogin = async (event) => {
            event.preventDefault();
            if (userId && !userId.startsWith('dev-fallback')) { window.showModalMessage('Already logged in.', 'warning'); return; }
            const form = event.target;
            const email = form.email.value;
            const password = form.password.value;
            const button = form.querySelector('button[type="submit"]');

            button.disabled = true;
            button.innerHTML = `<span class="flex items-center justify-center"><div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mr-2"></div> Logging in...</span>`;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // onAuthStateChanged listener handles navigation
            } catch (error) {
                console.error("Login Error:", error);
                window.showModalMessage(`Login failed: ${error.message}`, 'error');
            } finally {
                button.disabled = false;
                button.innerHTML = 'Login to Jal-Mitra';
            }
        };

        window.handleSignup = async (event) => {
            event.preventDefault();
            const form = event.target;
            const email = form.email.value;
            const password = form.password.value;
            const name = form.name.value.trim();
            const button = form.querySelector('button[type="submit"]');

            if (password.length < 6) { window.showModalMessage("Password must be at least 6 characters long.", 'error'); return; }

            button.disabled = true;
            button.innerHTML = `<span class="flex items-center justify-center"><div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mr-2"></div> Signing up...</span>`;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                await setDoc(doc(db, getCollectionPath('UserProfile'), userCredential.user.uid), {
                    name: name, email: email, role: 'functionary', createdAt: serverTimestamp()
                });
                window.showModalMessage('Registration successful! Redirecting...', 'success');
            } catch (error) {
                console.error("Sign Up Error:", error);
                window.showModalMessage(`Sign up failed: ${error.message}`, 'error');
            } finally {
                button.disabled = false;
                button.innerHTML = 'Create Account';
            }
        };

        window.handleLogout = async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("Logout Error:", error);
                window.showModalMessage('Logout failed.', 'error');
            }
        };

        window.submitOMLog = async (event) => {
            event.preventDefault();
            if (!userId || userId.startsWith('dev-fallback')) { window.showModalMessage('Save Failed. Authentication required.', 'error'); return; }
            
            const form = event.target;
            const pumpHours = parseFloat(form.pumpHours.value);
            const meterReading = parseFloat(form.meterReading.value);
            const leakageStatus = form.leakageStatus.value;
            
            if (isNaN(pumpHours) || isNaN(meterReading) || pumpHours < 0 || meterReading < 0) {
                window.showModalMessage("Validation Error: Invalid numbers for Pump Hours/Meter Reading.", 'warning'); return;
            }

            const logData = {
                pumpHours: pumpHours,
                meterReading: meterReading,
                powerConsumption: parseFloat(form.powerConsumption.value || 0),
                leakageStatus: leakageStatus,
                notes: form.notes.value,
                timestamp: serverTimestamp(),
                reportedBy: userId,
            };

            try {
                await addDoc(collection(db, getCollectionPath('OMLogs')), logData);
                window.showModalMessage("Success!", "Daily O&M Log saved.", 'success');
                window.navigate('Dashboard');
            } catch (e) {
                console.error("Error saving O&M Log:", e);
                window.showModalMessage("Save Failed", `Failed to save O&M Log: ${e.message}`, 'error');
            }
        };

        window.submitWaterQualityLog = async (event) => {
            event.preventDefault();
            if (!userId || userId.startsWith('dev-fallback')) { window.showModalMessage('Save Failed. Authentication required.', 'error'); return; }

            const form = event.target;
            const chlorineLevel = parseFloat(form.chlorineLevel.value);
            const pH = parseFloat(form.pH.value);
            const tdsLevel = parseFloat(form.tdsLevel.value) || 0;

            if (isNaN(chlorineLevel) || isNaN(pH)) {
                window.showModalMessage("Validation Error: Please ensure Chlorine and pH are valid numbers.", 'warning'); return;
            }

            const logData = {
                chlorineLevel: chlorineLevel,
                pH: pH,
                tdsLevel: tdsLevel,
                location: form.location.value,
                timestamp: serverTimestamp(),
                reportedBy: userId,
            };

            try {
                await addDoc(collection(db, getCollectionPath('WaterQuality')), logData);
                window.showModalMessage("Success!", "Water Quality Log saved.", 'success');
                window.navigate('Dashboard');
            } catch (e) {
                console.error("Error saving Water Quality Log:", e);
                window.showModalMessage("Save Failed", `Failed to save Quality Log: ${e.message}`, 'error');
            }
        };

        window.submitFaultReport = async (event) => {
            event.preventDefault();
            if (!userId || userId.startsWith('dev-fallback')) { window.showModalMessage('Save Failed. Authentication required.', 'error'); return; }
            
            const form = event.target;
            const description = form.description.value.trim();
            if (description.length < 10) { window.showModalMessage('Please provide a detailed description (min 10 chars).', 'error'); return; }

            const faultData = {
                description: description,
                location: form.location.value,
                priority: form.priority.value,
                contact: form.contact.value.trim(),
                status: 'Reported', // Initial status
                timestamp: serverTimestamp(),
                reportedBy: userId,
            };

            try {
                await addDoc(collection(db, getCollectionPath('Faults')), faultData);
                window.showModalMessage("Success!", "Fault reported.", 'success');
                window.navigate('Faults');
            } catch (e) {
                console.error("Error saving Fault Report:", e);
                window.showModalMessage("Save Failed", `Failed to submit fault: ${e.message}`, 'error');
            }
        };

        window.updateFaultStatus = async (faultId, newStatus) => {
            if (!userId || userId.startsWith('dev-fallback')) { window.showModalMessage('Update Failed. Authentication required.', 'error'); return; }
            
            const faultDocRef = doc(db, getCollectionPath('Faults'), faultId);
            
            try {
                await updateDoc(faultDocRef, { status: newStatus, lastUpdated: serverTimestamp() });
                window.showModalMessage(`Status updated to: ${newStatus}`, 'success');
            } catch (e) {
                console.error("Error updating fault status: ", e);
                window.showModalMessage(`Failed to update status: ${e.message}`, 'error');
            }
        };

        // ----------------------------------------------------------------------
        // 3. UI COMPONENTS AND ROUTING
        // ----------------------------------------------------------------------

        window.navigate = (pageName) => {
            currentPage = pageName;
            window.renderApp();
            document.getElementById('app').scrollTop = 0; 
        };
        
        // --- Page Templates ---
        const LoginPage = () => { /* Content Omitted for brevity (same as previous) */ return `
            <div class="p-4 sm:p-6 page-content flex items-center justify-center min-h-[500px]">
                <div class="w-full max-w-md p-6 bg-white rounded-xl shadow-2xl border-t-4 border-emerald-600">
                    <h1 class="text-3xl font-extrabold text-gray-800 mb-2 text-center">Jal-Mitra Login</h1>
                    <p class="text-gray-600 mb-6 text-center">Access the Gram Panchayat O&M Platform</p>
                    
                    <form onsubmit="event.preventDefault(); handleLogin(event);" class="space-y-6">
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                            <input type="email" id="email" name="email" required 
                                placeholder="your.email@example.com" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 focus:border-indigo-500 focus:ring-indigo-500" />
                        </div>
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                            <input type="password" id="password" name="password" required
                                placeholder="••••••••" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 focus:border-indigo-500 focus:ring-indigo-500" />
                        </div>
                        <button type="submit" class="w-full py-3 bg-emerald-600 text-white font-extrabold rounded-lg shadow-md hover:bg-emerald-700 transition-colors duration-200 focus:outline-none focus:ring-4 focus:ring-emerald-500 focus:ring-opacity-50">
                            Login to Jal-Mitra
                        </button>
                    </form>
                    <p class="mt-6 text-center text-sm text-gray-600">
                        Don't have an account? 
                        <button onclick="navigate('Signup')" class="text-indigo-600 font-medium hover:text-indigo-800 transition-colors">Sign Up Here</button>
                    </p>
                </div>
            </div>
        `; };

        const SignupPage = () => { /* Content Omitted for brevity (same as previous) */ return `
            <div class="p-4 sm:p-6 page-content flex items-center justify-center min-h-[500px]">
                <div class="w-full max-w-md p-6 bg-white rounded-xl shadow-2xl border-t-4 border-indigo-600">
                    <h1 class="text-3xl font-extrabold text-gray-800 mb-2 text-center">Jal-Mitra Sign Up</h1>
                    <p class="text-gray-600 mb-6 text-center">Create an account for O&M Reporting</p>
                    
                    <form onsubmit="event.preventDefault(); handleSignup(event);" class="space-y-4">
                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                            <input type="text" id="name" name="name" required 
                                placeholder="Your Name" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 focus:border-indigo-500 focus:ring-indigo-500" />
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                            <input type="email" id="email" name="email" required 
                                placeholder="your.email@example.com" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 focus:border-indigo-500 focus:ring-indigo-500" />
                        </div>
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700">Password (Min 6 characters)</label>
                            <input type="password" id="password" name="password" required minlength="6"
                                placeholder="••••••••" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-3 focus:border-indigo-500 focus:ring-indigo-500" />
                        </div>
                        <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-extrabold rounded-lg shadow-md hover:bg-indigo-700 transition-colors duration-200 focus:outline-none focus:ring-4 focus:ring-indigo-500 focus:ring-opacity-50">
                            Create Account
                        </button>
                    </form>
                    <p class="mt-6 text-center text-sm text-gray-600">
                        Already have an account? 
                        <button onclick="navigate('Login')" class="text-emerald-600 font-medium hover:text-emerald-800 transition-colors">Login Here</button>
                    </p>
                </div>
            </div>
        `; };

        const DashboardPage = () => { 
            if (!userId && isAuthReady) { return LoginPage(); } 
            
            const s = window.appData;
            const getStatusColor = (status) => {
                switch (status) {
                    case 'Operational': return 'bg-emerald-500';
                    case 'Warning': return 'bg-amber-500';
                    case 'Fault': return 'bg-red-500';
                    default: return 'bg-gray-400';
                }
            };
            const getQualityColorClass = (compliance) => {
                switch (compliance) {
                    case 'Compliant': return 'text-emerald-600 bg-emerald-100';
                    case 'Non-Compliant': return 'text-red-600 bg-red-100';
                    case 'Needs Check': return 'text-amber-600 bg-amber-100';
                    default: return 'text-gray-600 bg-gray-100';
                }
            };

            return `
                <div class="p-4 sm:p-6 page-content">
                    <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-2">System Health Dashboard</h1>
    
                    <!-- User ID Display for Collaboration -->
                    <div class="mb-6 bg-blue-50 p-3 rounded-lg text-sm text-blue-800">
                        <span class="font-semibold">Your User ID:</span> ${window.appData.userIdDisplay}
                        <span class="block text-xs text-blue-600 mt-1">Share this ID for multi-user collaboration testing.</span>
                    </div>
    
                    <!-- 1. Overall Status Card -->
                    <div class="data-card mb-6 p-6 rounded-xl ${getStatusColor(s.systemStatus)} text-white transition-all">
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-xl font-semibold mb-1">Overall System Status</h2>
                                <p class="text-4xl font-extrabold">${s.systemStatus}</p>
                            </div>
                            <span class="text-5xl opacity-80">${s.systemStatus === 'Operational' ? '✅' : s.systemStatus === 'Warning' ? '⚠️' : '🚨'}</span>
                        </div>
                    </div>
    
                    <!-- 2. Key Metrics Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                        <!-- Water Quality Compliance -->
                        <div class="data-card p-4 rounded-xl bg-white border border-gray-200">
                            <p class="text-sm font-medium text-gray-500">Water Quality</p>
                            <div class="text-2xl font-bold text-gray-800 mt-1">${s.qualityCompliance}</div>
                            <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${getQualityColorClass(s.qualityCompliance)} mt-2 inline-block">
                                Last Check: ${s.lastQualityCheck}
                            </span>
                        </div>
    
                        <!-- Pump Run Hours -->
                        <div class="data-card p-4 rounded-xl bg-white border border-gray-200">
                            <p class="text-sm font-medium text-gray-500">Last Pump Run</p>
                            <div class="text-2xl font-bold text-gray-800 mt-1">${s.lastPumpRun}</div>
                            <p class="text-xs text-gray-400 mt-2">Check O&M Log for details</p>
                        </div>
    
                        <!-- Pending Faults -->
                        <div class="data-card p-4 rounded-xl bg-white border border-gray-200">
                            <p class="text-sm font-medium text-gray-500">Pending Faults</p>

        const QualityPage = () => { /* Content Omitted for brevity */ return `

                    <button type="submit" class="w-full py-3 bg-yellow-600 text-white font-extrabold rounded-xl shadow-md hover:bg-yellow-700 transition-colors duration-200 focus:outline-none focus:ring-4 focus:ring-yellow-500 focus:ring-opacity-50">

        const FaultsPage = () => { /* Content Omitted for brevity */ 
            const pendingFaults = window.faultsData.filter(f => f.status !== 'Resolved');
            const resolvedFaults = window.faultsData.filter(f => f.status === 'Resolved');
            
            const getStatusTag = (status) => `<span class="px-3 py-1 text-xs font-semibold rounded-full status-tag-${status.replace(/\s/g, '')}">${status}</span>`;
            
            const getFaultListItem = (fault) => {
                const date = fault.timestamp ? new Date(fault.timestamp.toDate()).toLocaleDateString() : 'N/A';
                return `
                    <div class="data-card bg-white p-4 rounded-xl border border-gray-200 mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-lg font-bold text-gray-800">${fault.description}</h3>
                            ${getStatusTag(fault.status)}
                        </div>
                        <p class="text-sm text-gray-600 mb-2">Location: ${fault.location} | Priority: <span class="font-semibold text-${fault.priority === 'High' ? 'red' : fault.priority === 'Medium' ? 'amber' : 'green'}-600">${fault.priority}</span></p>
                        
                        <div class="mt-3 pt-3 border-t border-gray-100 flex items-center space-x-2">
                            <label class="text-sm font-medium text-gray-700 whitespace-nowrap">Update Status:</label>
                            <select onchange="window.updateFaultStatus('${fault.id}', this.value)" 
                                class="block w-full text-sm rounded-md border-gray-300 shadow-sm p-1.5 bg-gray-50 focus:border-blue-500 focus:ring-blue-500">
                                ${['Reported', 'Assigned', 'InProgress', 'Resolved'].map(status => `
                                    <option value="${status}" ${fault.status === status ? 'selected' : ''}>${status}</option>
                                `).join('')}
                            </select>

                    </div>
                `;
            };

            return `
                <div class="p-4 sm:p-6 page-content">
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">Maintenance & Fault Tracker</h1>
                    <p class="text-gray-600 mb-6 border-b pb-4">Report new issues quickly and track their resolution status.</p>
    
                    <!-- REPORT FAULT FORM -->
                    <div class="bg-red-50 p-4 rounded-xl shadow-lg mb-8">
                        <h2 class="text-xl font-bold text-red-800 mb-3">Report a New Fault</h2>
                        <form onsubmit="event.preventDefault(); window.submitFaultReport(event);" class="space-y-4">
                            <div>
                                <label for="description" class="block text-sm font-medium text-gray-700">Detailed Description</label>
                                <textarea id="description" name="description" rows="2" required placeholder="e.g., Main pump is vibrating heavily and making a grinding noise." class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 focus:border-red-500 focus:ring-red-500"></textarea>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label for="location" class="block text-sm font-medium text-gray-700">Location</label>
                                    <input type="text" id="location" name="location" required placeholder="e.g., Near Tank 1, Pipeline to School" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 focus:border-red-500 focus:ring-red-500" />
                                </div>
                                <div>
                                    <label for="priority" class="block text-sm font-medium text-gray-700">Priority</label>
                                    <select id="priority" name="priority" required class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 focus:border-red-500 focus:ring-red-500">
                                        <option value="Low">Low</option>
                                        <option value="Medium" selected>Medium</option>
                                        <option value="High">High</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label for="contact" class="block text-sm font-medium text-gray-700">Your Contact (Phone/Name)</label>
                                <input type="text" id="contact" name="contact" required placeholder="Name and Phone Number" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm p-2 focus:border-red-500 focus:ring-red-500" />
                            </div>
                            <button type="submit" class="w-full py-2.5 bg-red-600 text-white font-extrabold rounded-lg shadow-md hover:bg-red-700 transition-colors">
                                Report Fault
                            </button>
                        </form>
                    </div>
    
                    <!-- PENDING FAULT LIST -->
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Pending Faults (${pendingFaults.length})</h2>
                    <div class="space-y-4">
                        ${pendingFaults.length > 0 ? pendingFaults.map(getFaultListItem).join('') : '<p class="text-gray-500 p-4 border rounded-xl bg-white">No outstanding maintenance issues currently reported. Great job!</p>'}
                    </div>
    
                    <!-- RESOLVED FAULTS TOGGLE -->
                    <div class="mt-8">
                        <h2 class="text-2xl font-bold text-gray-800 mb-4 border-t pt-4">Resolved Faults (${resolvedFaults.length})</h2>
                        <details class="bg-gray-100 p-4 rounded-xl">
                            <summary class="font-semibold cursor-pointer text-gray-700">Show Resolved Issues</summary>
                            <div class="mt-4 space-y-4">
                                ${resolvedFaults.length > 0 ? resolvedFaults.map(getFaultListItem).join('') : '<p class="text-gray-500">No faults have been resolved yet.</p>'}
                            </div>
                        </details>
                    </div>
                </div>
            `;
        };

        const AnalyticsPage = () => { /* Content Omitted for brevity */ 
            if (window.omLogs.length === 0 && window.qualityLogs.length === 0) {
                return `<div class="p-8 text-center page-content">
                    <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-2">Predictive Insights & Analytics</h1>
                    <div class="bg-gray-100 p-8 rounded-xl mt-6">
                        <p class="text-lg font-semibold text-gray-700">Data required for analysis.</p>
                        <p class="text-gray-500 mt-2">Please log a few days of O&M Data and Water Quality checks to generate insights.</p>
                        <button onclick="window.navigate('OMLog')" class="mt-4 py-2 px-4 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Start Logging Data</button>
                    </div>
                </div>`;
            }
            // Logic to aggregate data is now inside the renderCharts function call below

            // We use a slight delay to ensure Chart.js canvas is in the DOM
            setTimeout(() => { window.renderCharts(); }, 100);

            return `
                <div class="p-4 sm:p-6 page-content">
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">Predictive Insights & Analytics</h1>
                    <p class="text-gray-600 mb-6 border-b pb-4">Turning raw O&M data into actionable intelligence.</p>
    
                    <!-- Chart 1: Pump Efficiency -->
                    <div class="data-card bg-white p-4 rounded-xl shadow-lg mb-8">
                        <h2 class="text-xl font-bold text-indigo-700 mb-4">Pump Usage & Efficiency Trend</h2>
                        <div class="h-80"><canvas id="efficiencyChart"></canvas></div>
                        <p class="text-sm text-gray-600 mt-4 border-t pt-3">
                            A sharp rise in **kWh / Hour Efficiency** may indicate mechanical wear, friction, or a voltage drop, providing an early warning for preventive maintenance.
                        </p>
                    </div>
    
                    <!-- Chart 2: Water Quality Trend -->
                    <div class="data-card bg-white p-4 rounded-xl shadow-lg mb-8">
                        <h2 class="text-xl font-bold text-yellow-700 mb-4">Water Quality Audit (pH & Chlorine)</h2>
                        <div class="h-80"><canvas id="qualityChart"></canvas></div>
                        <p class="text-sm text-gray-600 mt-4 border-t pt-3">
                            Monitor trends to ensure consistent water treatment. Low chlorine levels (below 0.2 mg/L) pose a health risk.
                        </p>
                    </div>
                </div>
            `;
        };

        const pageComponents = {
            'Login': LoginPage, 'Signup': SignupPage, 'Dashboard': DashboardPage, 
            'OMLog': OMLogPage, 'Quality': QualityPage, 'Faults': FaultsPage, 'Analytics': AnalyticsPage,
        };
        
        // --- UI Rendering ---
        window.renderApp = () => {
            const appContainer = document.getElementById('app');
            const navBar = renderNavBar();
            const pageContent = pageComponents[currentPage] ? pageComponents[currentPage]() : `<div class="p-8 text-center text-red-500">Error: Page not found for: ${currentPage}</div>`;

            appContainer.innerHTML = `
                ${navBar}
                ${pageContent}
                <footer class="text-center text-xs text-gray-400 p-4 border-t">
                    B.Tech CSE Final Year Project | Jal-Mitra O&M Platform
                </footer>
            `;
        };

        const renderNavBar = () => {
            if (!userId) {
                return `<nav class="bg-white sticky top-0 border-b border-gray-200 shadow-md z-10"><div class="max-w-4xl mx-auto flex justify-between items-center p-3">
                    <div class="text-xl font-extrabold text-emerald-600">💧 Jal-Mitra</div>
                </div></nav>`;
            }
            
            const navItems = ['Dashboard', 'OMLog', 'Quality', 'Faults', 'Analytics'];
            return `
                <nav class="bg-white sticky top-0 border-b border-gray-200 shadow-md z-10">
                    <div class="max-w-4xl mx-auto flex justify-between items-center p-3 sm:p-4">
                        <div class="text-xl font-extrabold text-emerald-600 flex items-center">💧 Jal-Mitra</div>
                        <div class="flex items-center space-x-2 sm:space-x-4 overflow-x-auto whitespace-nowrap">
                            ${navItems.map(item => `
                                <button onclick="window.navigate('${item}')" 
                                    class="text-sm px-2 py-2 transition-colors duration-200 ${currentPage === item ? 'nav-active' : 'text-gray-500 hover:text-emerald-500'}">
                                    ${item.replace(/([A-Z])/g, ' $1').trim()}
                                </button>
                            `).join('')}
                            <button onclick="window.handleLogout()" class="text-sm px-3 py-1 bg-red-100 text-red-600 font-semibold rounded-lg hover:bg-red-200 transition-colors">
                                Logout
                            </button>
                        </div>
                    </div>
                </nav>
            `;
        };
        
        // --- CHARTING LOGIC ---
        window.renderCharts = () => {
            const formatDate = (timestamp) => timestamp ? new Date(timestamp.toDate()).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) : 'N/A';
            
            // --- 1. Prepare Pump Data ---
            const omByDate = window.omLogs.reduce((acc, log) => {
                const date = log.timestamp ? log.timestamp.toDate().toISOString().split('T')[0] : 'N/A';
                if (!acc[date]) { acc[date] = { pumpHours: 0, meterReading: log.meterReading, logs: [] }; }
                acc[date].pumpHours += log.pumpHours;
                acc[date].meterReading = log.meterReading; // Keep the last reading of the day
                acc[date].logs.push(log);
                return acc;
            }, {});

            const sortedDates = Object.keys(omByDate).sort();
            const pumpHoursData = [];
            const efficiencyData = [];
            let lastMeterReading = null;

            sortedDates.forEach((date, index) => {
                const dailyData = omByDate[date];
                pumpHoursData.push(dailyData.pumpHours);
                
                let dailyEfficiency = null;
                if (index > 0 && lastMeterReading !== null && dailyData.meterReading > 0) {
                    const consumption = dailyData.meterReading - lastMeterReading;
                    if (dailyData.pumpHours > 0 && consumption > 0) {
                        dailyEfficiency = parseFloat((consumption / dailyData.pumpHours).toFixed(2));
                    }
                }
                efficiencyData.push(dailyEfficiency);
                lastMeterReading = dailyData.meterReading > 0 ? dailyData.meterReading : lastMeterReading;
            });
            
            // --- 2. Prepare Water Quality Data ---
            const qualityByDate = window.qualityLogs.reduce((acc, log) => {
                const date = log.timestamp ? log.timestamp.toDate().toISOString().split('T')[0] : 'N/A';
                if (!acc[date]) { acc[date] = { phValues: [], chlorineValues: [] }; }
                acc[date].phValues.push(log.pH);
                acc[date].chlorineValues.push(log.chlorineLevel);
                return acc;
            }, {});

            const qualityDates = Object.keys(qualityByDate).sort();
            const phData = qualityDates.map(date => parseFloat((qualityByDate[date].phValues.reduce((a, b) => a + b, 0) / qualityByDate[date].phValues.length).toFixed(1)));
            const chlorineData = qualityDates.map(date => parseFloat((qualityByDate[date].chlorineValues.reduce((a, b) => a + b, 0) / qualityByDate[date].chlorineValues.length).toFixed(2)));

            
            // --- Draw Charts ---
            const renderEfficiencyChart = (labels, pumpHours, efficiency) => {
                const ctx = document.getElementById('efficiencyChart');
                if (!ctx) return;
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.map(d => formatDate(d)),
                        datasets: [
                            { type: 'bar', label: 'Pump Hours (Hrs)', data: pumpHours, backgroundColor: 'rgba(59, 130, 246, 0.6)', yAxisID: 'y1' },
                            { type: 'line', label: 'kWh / Hour Efficiency', data: efficiency, borderColor: 'rgb(234, 88, 12)', borderWidth: 3, fill: false, yAxisID: 'y2', tension: 0.4 },
                        ]
                    },
                    options: { maintainAspectRatio: false, scales: { y1: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Pump Hours' } }, y2: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Efficiency Index' }, min: 0 } }, plugins: { legend: { position: 'top' } } }
                });
            };

            const renderQualityChart = (labels, phData, chlorineData) => {
                const ctx = document.getElementById('qualityChart');
                if (!ctx) return;
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.map(d => formatDate(d)),
                        datasets: [
                            { type: 'line', label: 'Average pH', data: phData, borderColor: 'rgb(5, 150, 105)', backgroundColor: 'rgba(5, 150, 105, 0.1)', yAxisID: 'y1', tension: 0.2, fill: true },
                            { type: 'bar', label: 'Avg Chlorine Residual (mg/L)', data: chlorineData, backgroundColor: 'rgba(234, 179, 8, 0.8)', yAxisID: 'y2' },
                        ]
                    },
                    options: { maintainAspectRatio: false, scales: { y1: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'pH Level' }, min: 6, max: 9 }, y2: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'Chlorine (mg/L)' }, min: 0, max: 1.0 } }, plugins: { legend: { position: 'top' } } }
                });
            };

            renderEfficiencyChart(sortedDates, pumpHoursData, efficiencyData);
            renderQualityChart(qualityDates, phData, chlorineData);
        };


        // ----------------------------------------------------------------------
        // 4. APPLICATION START
        // ----------------------------------------------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            // Initial render of the loading state
            window.renderApp(); 
            // Start the initialization, which updates the state and re-renders
            window.initializeAppAndAuth();
        });
    </script>
</body>
</html>
